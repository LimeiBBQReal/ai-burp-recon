name: Recon - Port Scan
on:
  workflow_dispatch:
    inputs:
      target:
        description: '目标域名'
        default: ''
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests cryptography
      - name: Run port scan
        env:
          TARGET: ${{ inputs.target }}
          PROXY_AES_KEY: ${{ secrets.PROXY_AES_KEY }}
          RECON_RSA_PUBLIC: ${{ secrets.RECON_RSA_PUBLIC }}
        run: python port_scan.py
      - name: Commit results
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/
          if git diff --cached --quiet; then
            echo "无变化, 跳过 commit"
          else
            git commit -m "recon: ports ${{ inputs.target }}"
            git push
          fi