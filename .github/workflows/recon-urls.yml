name: Recon - URL Collect
on:
  workflow_dispatch:
    inputs:
      target:
        description: '目标域名'
        default: ''
        required: true

jobs:
  urls:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install deps
        run: pip install requests cryptography
      - name: Run URL collect
        env:
          TARGET: ${{ inputs.target }}
          PROXY_AES_KEY: ${{ secrets.PROXY_AES_KEY }}
          RECON_RSA_PUBLIC: ${{ secrets.RECON_RSA_PUBLIC }}
        run: python recon/url_collect.py
      - name: Commit results
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recon/out/*.enc 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化, 跳过 commit"
          else
            git commit -m "recon: urls ${{ inputs.target }}"
            git push
          fi