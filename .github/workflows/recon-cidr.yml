name: Recon - CIDR Scan
on:
  workflow_dispatch:
    inputs:
      target:
        description: '目标域名'
        default: ''
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install deps
        run: pip install requests cryptography
      - name: Run CIDR scan
        env:
          TARGET: ${{ inputs.target }}
          PROXY_AES_KEY: ${{ secrets.PROXY_AES_KEY }}
          RECON_RSA_PUBLIC: ${{ secrets.RECON_RSA_PUBLIC }}
        run: python cidr_scan.py
      - name: Commit results
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "LimeiBBQReal"
          git config user.email "LimeiBBQReal@users.noreply.github.com"
          git remote set-url origin https://LimeiBBQReal:${PAT_TOKEN}@github.com/LimeiBBQReal/ai-burp-recon.git
          git add out/
          if git diff --cached --quiet; then
            echo "无变化, 跳过 commit"
          else
            git commit -m "recon: cidr ${{ inputs.target }}"
            git push
          fi