name: Phase 3 - Web Scan
on:
  workflow_dispatch:
    inputs:
      target:
        description: '目标域名'
        default: 'CartManager.net'
        required: true

jobs:
  port_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests cryptography
      - name: Run port scan
        env:
          TARGET: ${{ inputs.target }}
          PROXY_AES_KEY: ${{ secrets.PROXY_AES_KEY }}
          RECON_RSA_PUBLIC: ${{ secrets.RECON_RSA_PUBLIC }}
        run: python port_scan.py
      - name: Commit results
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "LimeiBBQReal"
          git config user.email "LimeiBBQReal@users.noreply.github.com"
          git add out/
          if git diff --cached --quiet; then
            echo "无变化, 跳过 commit"
          else
            git commit -m "recon: ports ${{ inputs.target }}"
            git fetch origin main && git rebase origin/main || true
            git push "https://LimeiBBQReal:${PAT_TOKEN}@github.com/LimeiBBQReal/ai-burp-recon.git" HEAD:main
          fi

  banner_grab:
    runs-on: ubuntu-latest
    timeout-minutes: 30
